<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <!-- Tiefer Premium-Hintergrundverlauf -->
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="100%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#141E33"/>
      <stop offset="50%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#05080F"/>
    </radialGradient>
    
    <!-- Subtiles Punkt-Raster (Dot Matrix) -->
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.03)"/>
    </pattern>

    <!-- Farbverläufe für das Logo -->
    <linearGradient id="logoBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B52D9"/>
      <stop offset="100%" stop-color="#4A75FF"/>
    </linearGradient>
    <linearGradient id="logoCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF"/>
      <stop offset="100%" stop-color="#42B9F5"/>
    </linearGradient>

    <!-- Verlauf für die Chart-Balken im Hintergrund -->
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42B9F5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#42B9F5" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Leucht- und Schatteneffekte -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 1. HINTERGRUND -->
  <rect width="1200" height="400" fill="url(#bgGlow)"/>
  <rect width="1200" height="400" fill="url(#dotGrid)"/>

  <!-- 2. ABSTRAKTE ANALYTICS ELEMENTE (Rechte Seite) -->
  <g transform="translate(600, 0)">
    <!-- Schwebende Glassmorphism Karte -->
    <rect x="150" y="80" width="380" height="260" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" filter="url(#dropShadow)"/>
    
    <!-- Balkendiagramm (Bar Charts) -->
    <rect x="200" y="240" width="40" height="60" rx="6" fill="url(#barGradient)"/>
    <rect x="260" y="180" width="40" height="120" rx="6" fill="url(#barGradient)"/>
    <rect x="320" y="120" width="40" height="180" rx="6" fill="url(#barGradient)"/>
    <rect x="380" y="150" width="40" height="150" rx="6" fill="url(#barGradient)"/>
    <rect x="440" y="210" width="40" height="90" rx="6" fill="url(#barGradient)"/>

    <!-- Fließendes Liniendiagramm -->
    <path d="M 0 350 C 150 350 200 220 320 220 C 400 220 450 280 600 250" fill="none" stroke="url(#logoCyan)" stroke-width="4" opacity="0.6" filter="url(#neonGlow)"/>
    <path d="M 0 350 C 150 350 200 220 320 220 C 400 220 450 280 600 250 L 600 400 L 0 400 Z" fill="url(#barGradient)" opacity="0.3"/>
    
    <!-- Leuchtende Datenpunkte -->
    <circle cx="320" cy="220" r="6" fill="#00D2FF" filter="url(#neonGlow)"/>
    <circle cx="440" cy="263" r="5" fill="#4A75FF" filter="url(#neonGlow)"/>
    <circle cx="230" cy="285" r="4" fill="#4A75FF" opacity="0.8"/>
  </g>

  <!-- 3. DEKORATIVE LINIEN (Linke Seite) -->
  <path d="M 0 80 L 150 80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <path d="M 0 320 L 250 320" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- 4. HAUPT-LOGO & TEXT (Zentriert/Links) -->
  <g transform="translate(120, 100)">
    
    <!-- Logo Icon Group -->
    <g transform="scale(1.2)">
      <!-- Das kantige "C" mit Verlauf -->
      <path d="M 80 20 L 40 20 L 20 40 L 20 80 L 40 100 L 80 100" 
            fill="none" stroke="url(#logoBlue)" stroke-width="16" stroke-linejoin="bevel" filter="url(#dropShadow)"/>
            
      <!-- Der aufsteigende Pfeil mit Neon-Cyan Verlauf -->
      <path d="M 10 90 L 50 50 L 70 70 L 105 25" 
            fill="none" stroke="url(#logoCyan)" stroke-width="14" stroke-linejoin="bevel" filter="url(#neonGlow)"/>
      <path d="M 75 25 L 105 25 L 105 55" 
            fill="none" stroke="url(#logoCyan)" stroke-width="14" stroke-linejoin="bevel" stroke-linecap="square" filter="url(#neonGlow)"/>
    </g>

    <!-- Typografie -->
    <text x="180" y="80" font-family="'Inter', '-apple-system', 'Segoe UI', sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" letter-spacing="-1">Countr</text>
    <text x="185" y="145" font-family="'Inter', '-apple-system', 'Segoe UI', sans-serif" font-weight="300" font-size="56" fill="#94A3B8" letter-spacing="1">Analytics</text>
    
    <!-- Tagline & Features (Deutsch) -->
    <text x="190" y="200" font-family="'Inter', '-apple-system', 'Segoe UI', sans-serif" font-size="15" fill="#42B9F5" font-weight="600" letter-spacing="2">
      DSGVO-KONFORM <tspan fill="#475569">|</tspan> SCHLANK <tspan fill="#475569">|</tspan> OPEN SOURCE
    </text>
  </g>
</svg>
